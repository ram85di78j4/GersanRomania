<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a1208"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="rgba(100,220,80,0.12)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#glow)"/>
  <!-- Chart background -->
  <rect x="80" y="80" width="640" height="300" rx="6" fill="rgba(10,15,8,0.6)" stroke="rgba(100,220,80,0.15)" stroke-width="1"/>
  <!-- Grid lines -->
  <line x1="80" y1="155" x2="720" y2="155" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="80" y1="230" x2="720" y2="230" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <line x1="80" y1="305" x2="720" y2="305" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
  <!-- Y-axis labels -->
  <text x="68" y="160" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">75%</text>
  <text x="68" y="235" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">50%</text>
  <text x="68" y="310" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)">25%</text>
  <!-- Old consumption bar (red) -->
  <rect x="160" y="120" width="80" height="260" rx="4" fill="rgba(255,60,60,0.3)" stroke="rgba(255,60,60,0.5)" stroke-width="1"/>
  <text x="200" y="110" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(255,60,60,0.8)">ANTERIOR</text>
  <text x="200" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">Fluorescent</text>
  <!-- LED bar (green) -->
  <rect x="360" y="210" width="80" height="170" rx="4" fill="rgba(100,220,80,0.3)" stroke="rgba(100,220,80,0.5)" stroke-width="1"/>
  <text x="400" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(100,220,80,0.8)">LED STANDARD</text>
  <text x="400" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">LED Basic</text>
  <!-- Smart LED bar (bright green) -->
  <rect x="560" y="270" width="80" height="110" rx="4" fill="rgba(100,220,80,0.5)" stroke="rgba(100,220,80,0.8)" stroke-width="1.5"/>
  <text x="600" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(100,220,80,1.0)">LED SMART</text>
  <text x="600" y="395" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.4)">LED Inteligent</text>
  <!-- Percentage labels -->
  <text x="200" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="rgba(255,60,60,0.9)">100%</text>
  <text x="400" y="228" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="rgba(100,220,80,0.9)">65%</text>
  <text x="600" y="288" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="rgba(100,220,80,1.0)">40%</text>
  <!-- Savings badge -->
  <rect x="580" y="100" width="120" height="50" rx="6" fill="rgba(100,220,80,0.15)" stroke="rgba(100,220,80,0.4)" stroke-width="1.5"/>
  <text x="640" y="122" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(100,220,80,0.9)">ECONOMII</text>
  <text x="640" y="142" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="rgba(100,220,80,1.0)">-60%</text>
  <!-- Label -->
  <text x="400" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="rgba(100,220,80,0.7)" letter-spacing="3">EFICIENȚĂ ENERGETICĂ LED</text>
  <text x="400" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)" letter-spacing="2">GERSAN ROMANIA</text>
</svg>
