  <rect x="390" y="0" width="4" height="80" fill="rgba(255,220,100,0.5)"/>
  <ellipse cx="392" cy="80" rx="18" ry="6" fill="rgba(255,220,100,0.6)"/>
  <rect x="620" y="0" width="4" height="80" fill="rgba(255,220,100,0.5)"/>
