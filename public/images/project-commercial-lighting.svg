    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#light1)"/>
  <rect width="800" height="500" fill="url(#light2)"/>
  <!-- Floor line -->
  <rect x="0" y="380" width="800" height="2" fill="rgba(255,220,100,0.15)"/>
