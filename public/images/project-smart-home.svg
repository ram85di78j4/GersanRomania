<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0f1520"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="rgba(180,140,255,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#glow)"/>
  <!-- House outline -->
  <polygon points="400,80 180,230 620,230" fill="none" stroke="rgba(180,140,255,0.3)" stroke-width="2"/>
  <rect x="200" y="230" width="400" height="200" fill="rgba(20,20,40,0.6)" stroke="rgba(180,140,255,0.25)" stroke-width="1.5"/>
  <!-- Roof fill -->
  <polygon points="400,82 182,230 618,230" fill="rgba(20,20,35,0.5)"/>
  <!-- Windows with warm light -->
  <rect x="240" y="270" width="80" height="70" rx="3" fill="rgba(255,220,100,0.2)" stroke="rgba(255,220,100,0.4)" stroke-width="1"/>
  <rect x="480" y="270" width="80" height="70" rx="3" fill="rgba(255,220,100,0.2)" stroke="rgba(255,220,100,0.4)" stroke-width="1"/>
  <!-- Door -->
  <rect x="360" y="330" width="80" height="100" rx="3" fill="rgba(180,140,255,0.15)" stroke="rgba(180,140,255,0.4)" stroke-width="1"/>
  <circle cx="432" cy="382" r="4" fill="rgba(255,255,255,0.5)"/>
  <!-- Smart hub ring -->
  <circle cx="400" cy="160" r="28" fill="none" stroke="rgba(180,140,255,0.4)" stroke-width="1.5" stroke-dasharray="4 3"/>
  <circle cx="400" cy="160" r="16" fill="rgba(180,140,255,0.2)" stroke="rgba(180,140,255,0.6)" stroke-width="1"/>
  <text x="400" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)">KNX</text>
  <!-- Connection lines -->
  <line x1="400" y1="176" x2="400" y2="230" stroke="rgba(180,140,255,0.3)" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="384" y1="160" x2="280" y2="305" stroke="rgba(180,140,255,0.2)" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="416" y1="160" x2="520" y2="305" stroke="rgba(180,140,255,0.2)" stroke-width="1" stroke-dasharray="3 3"/>
  <!-- Label -->
  <text x="400" y="458" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="rgba(180,140,255,0.8)" letter-spacing="3">AUTOMATIZARE SMART HOME</text>
  <text x="400" y="480" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)" letter-spacing="2">GERSAN ROMANIA</text>
</svg>
