<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a1520"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="rgba(0,200,150,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#glow)"/>
  <!-- Ground -->
  <rect x="0" y="360" width="800" height="140" fill="rgba(0,0,0,0.4)"/>
  <rect x="0" y="358" width="800" height="3" fill="rgba(0,200,150,0.15)"/>
  <!-- Parking lines -->
  <line x1="160" y1="360" x2="160" y2="500" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <line x1="340" y1="360" x2="340" y2="500" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <line x1="460" y1="360" x2="460" y2="500" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <line x1="640" y1="360" x2="640" y2="500" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
  <!-- Car 1 (left) -->
  <rect x="60" y="290" width="200" height="80" rx="12" fill="rgba(20,40,60,0.8)" stroke="rgba(0,200,150,0.3)" stroke-width="1.5"/>
  <rect x="80" y="270" width="160" height="40" rx="8" fill="rgba(20,40,60,0.9)" stroke="rgba(0,200,150,0.2)" stroke-width="1"/>
  <circle cx="100" cy="375" r="18" fill="rgba(10,10,20,0.9)" stroke="rgba(0,200,150,0.4)" stroke-width="2"/>
  <circle cx="220" cy="375" r="18" fill="rgba(10,10,20,0.9)" stroke="rgba(0,200,150,0.4)" stroke-width="2"/>
  <rect x="85" y="295" width="50" height="30" rx="4" fill="rgba(0,200,150,0.1)"/>
  <rect x="155" y="295" width="50" height="30" rx="4" fill="rgba(0,200,150,0.1)"/>
  <!-- Charging indicator car 1 -->
  <circle cx="160" cy="285" r="8" fill="rgba(0,200,150,0.8)"/>
  <text x="160" y="289" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">⚡</text>
  <!-- Car 2 (right) -->
  <rect x="540" y="290" width="200" height="80" rx="12" fill="rgba(20,40,60,0.8)" stroke="rgba(0,200,150,0.3)" stroke-width="1.5"/>
  <rect x="560" y="270" width="160" height="40" rx="8" fill="rgba(20,40,60,0.9)" stroke="rgba(0,200,150,0.2)" stroke-width="1"/>
  <circle cx="580" cy="375" r="18" fill="rgba(10,10,20,0.9)" stroke="rgba(0,200,150,0.4)" stroke-width="2"/>
  <circle cx="700" cy="375" r="18" fill="rgba(10,10,20,0.9)" stroke="rgba(0,200,150,0.4)" stroke-width="2"/>
  <rect x="565" y="295" width="50" height="30" rx="4" fill="rgba(0,200,150,0.1)"/>
  <rect x="635" y="295" width="50" height="30" rx="4" fill="rgba(0,200,150,0.1)"/>
  <circle cx="640" cy="285" r="8" fill="rgba(0,200,150,0.8)"/>
  <text x="640" y="289" text-anchor="middle" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="white">⚡</text>
  <!-- Central fleet management display -->
  <rect x="300" y="130" width="200" height="130" rx="8" fill="rgba(10,20,35,0.9)" stroke="rgba(0,200,150,0.4)" stroke-width="1.5"/>
  <text x="400" y="158" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(0,200,150,0.8)" letter-spacing="2">FLEET MANAGEMENT</text>
  <text x="400" y="182" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="rgba(255,255,255,0.95)">24 / 24</text>
  <text x="400" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="rgba(0,200,150,0.7)">VEHICULE CONECTATE</text>
  <rect x="320" y="215" width="160" height="4" rx="2" fill="rgba(255,255,255,0.1)"/>
  <rect x="320" y="215" width="130" height="4" rx="2" fill="rgba(0,200,150,0.6)"/>
  <text x="400" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.5)">Energie utilizată: 847 kWh</text>
  <!-- Connection lines -->
  <line x1="300" y1="200" x2="180" y2="285" stroke="rgba(0,200,150,0.25)" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="500" y1="200" x2="620" y2="285" stroke="rgba(0,200,150,0.25)" stroke-width="1.5" stroke-dasharray="5 4"/>
  <!-- Label -->
  <text x="400" y="455" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="rgba(0,200,150,0.8)" letter-spacing="3">MANAGEMENT FLOTĂ EV</text>
  <text x="400" y="478" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)" letter-spacing="2">GERSAN ROMANIA</text>
</svg>
