<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1a2e"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="rgba(0,180,255,0.2)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#glow)"/>
  <!-- Ground -->
  <rect x="0" y="390" width="800" height="110" fill="rgba(0,0,0,0.4)"/>
  <rect x="0" y="388" width="800" height="3" fill="rgba(0,180,255,0.2)"/>
  <!-- EV Charging station body -->
  <rect x="320" y="160" width="160" height="240" rx="8" fill="rgba(20,40,60,0.9)" stroke="rgba(0,180,255,0.4)" stroke-width="1.5"/>
  <!-- Screen -->
  <rect x="340" y="185" width="120" height="80" rx="4" fill="rgba(0,180,255,0.15)" stroke="rgba(0,180,255,0.5)" stroke-width="1"/>
  <text x="400" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="rgba(0,180,255,0.9)">CHARGING</text>
  <text x="400" y="238" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="rgba(255,255,255,0.95)">87%</text>
  <text x="400" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="rgba(0,180,255,0.7)">22 kW · DC FAST</text>
  <!-- Connector -->
  <rect x="375" y="310" width="50" height="30" rx="4" fill="rgba(0,180,255,0.3)" stroke="rgba(0,180,255,0.6)" stroke-width="1"/>
  <text x="400" y="330" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="rgba(255,255,255,0.8)">CCS2</text>
  <!-- Cable -->
  <path d="M400 340 Q340 370 310 390" stroke="rgba(0,180,255,0.5)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Status light -->
  <circle cx="400" cy="170" r="5" fill="rgba(0,220,100,0.9)"/>
  <!-- Side lights -->
  <rect x="318" y="180" width="3" height="200" fill="rgba(0,180,255,0.3)"/>
  <rect x="479" y="180" width="3" height="200" fill="rgba(0,180,255,0.3)"/>
  <!-- Label -->
  <text x="400" y="445" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="rgba(0,180,255,0.8)" letter-spacing="3">STAȚII DE ÎNCĂRCARE EV</text>
  <text x="400" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)" letter-spacing="2">GERSAN ROMANIA</text>
</svg>
