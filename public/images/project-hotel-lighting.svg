<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#12100a"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="55%">
      <stop offset="0%" stop-color="rgba(255,200,80,0.18)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <rect width="800" height="500" fill="url(#glow)"/>
  <!-- Building facade -->
  <rect x="150" y="60" width="500" height="380" fill="rgba(25,20,12,0.7)" stroke="rgba(255,200,80,0.15)" stroke-width="1"/>
  <!-- Hotel floors with windows - warm glow -->
  <!-- Floor 5 -->
  <rect x="180" y="90" width="55" height="40" rx="2" fill="rgba(255,200,80,0.12)"/>
  <rect x="255" y="90" width="55" height="40" rx="2" fill="rgba(255,200,80,0.18)"/>
  <rect x="330" y="90" width="55" height="40" rx="2" fill="rgba(255,200,80,0.10)"/>
  <rect x="405" y="90" width="55" height="40" rx="2" fill="rgba(255,200,80,0.20)"/>
  <rect x="480" y="90" width="55" height="40" rx="2" fill="rgba(255,200,80,0.14)"/>
  <rect x="555" y="90" width="55" height="40" rx="2" fill="rgba(255,200,80,0.16)"/>
  <!-- Floor 4 -->
  <rect x="180" y="150" width="55" height="40" rx="2" fill="rgba(255,200,80,0.20)"/>
  <rect x="255" y="150" width="55" height="40" rx="2" fill="rgba(255,200,80,0.12)"/>
  <rect x="330" y="150" width="55" height="40" rx="2" fill="rgba(255,200,80,0.22)"/>
  <rect x="405" y="150" width="55" height="40" rx="2" fill="rgba(255,200,80,0.10)"/>
  <rect x="480" y="150" width="55" height="40" rx="2" fill="rgba(255,200,80,0.18)"/>
  <rect x="555" y="150" width="55" height="40" rx="2" fill="rgba(255,200,80,0.14)"/>
  <!-- Floor 3 -->
  <rect x="180" y="210" width="55" height="40" rx="2" fill="rgba(255,200,80,0.15)"/>
  <rect x="255" y="210" width="55" height="40" rx="2" fill="rgba(255,200,80,0.22)"/>
  <rect x="330" y="210" width="55" height="40" rx="2" fill="rgba(255,200,80,0.12)"/>
  <rect x="405" y="210" width="55" height="40" rx="2" fill="rgba(255,200,80,0.18)"/>
  <rect x="480" y="210" width="55" height="40" rx="2" fill="rgba(255,200,80,0.20)"/>
  <rect x="555" y="210" width="55" height="40" rx="2" fill="rgba(255,200,80,0.10)"/>
  <!-- Floor 2 -->
  <rect x="180" y="270" width="55" height="40" rx="2" fill="rgba(255,200,80,0.18)"/>
  <rect x="255" y="270" width="55" height="40" rx="2" fill="rgba(255,200,80,0.14)"/>
  <rect x="330" y="270" width="55" height="40" rx="2" fill="rgba(255,200,80,0.20)"/>
  <rect x="405" y="270" width="55" height="40" rx="2" fill="rgba(255,200,80,0.16)"/>
  <rect x="480" y="270" width="55" height="40" rx="2" fill="rgba(255,200,80,0.12)"/>
  <rect x="555" y="270" width="55" height="40" rx="2" fill="rgba(255,200,80,0.22)"/>
  <!-- Ground floor entrance -->
  <rect x="310" y="350" width="180" height="90" fill="rgba(255,200,80,0.10)" stroke="rgba(255,200,80,0.3)" stroke-width="1"/>
  <!-- Facade uplights -->
  <ellipse cx="200" cy="440" rx="40" ry="15" fill="rgba(255,200,80,0.12)"/>
  <ellipse cx="400" cy="440" rx="40" ry="15" fill="rgba(255,200,80,0.12)"/>
  <ellipse cx="600" cy="440" rx="40" ry="15" fill="rgba(255,200,80,0.12)"/>
  <!-- Hotel name -->
  <text x="400" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="rgba(255,200,80,0.6)" letter-spacing="6">★ HOTEL ★</text>
  <!-- Label -->
  <text x="400" y="470" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="rgba(255,200,80,0.7)" letter-spacing="3">ILUMINAT ARHITECTURAL HOTEL</text>
  <text x="400" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="rgba(255,255,255,0.3)" letter-spacing="2">GERSAN ROMANIA</text>
</svg>
